# Disabled: ShutdownCoordinator runs its own JVM shutdown hook that logs
# through completion. Log4j2's own auto-registered shutdown hook races it and
# can shut down the logger context (closing appenders) before the coordinator
# finishes, silently dropping its later log lines.
shutdownHook = disable

appender.console.type = Console
appender.console.name = STDOUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %X{correlationId} %m%n

appender.file.type = File
appender.file.name = File
appender.file.fileName = jmud.log
appender.file.layout.type = PatternLayout
appender.file.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %X{correlationId} %m%n

rootLogger.level = TRACE
rootLogger.appenderRef.stdout.ref = STDOUT
rootLogger.appenderRef.file.ref = File
