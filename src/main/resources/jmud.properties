jmud.prompt.format=[{hp}/{maxHp}hp {mana}/{maxMana}mn {move}/{maxMove}mv {exp}xp]
jmud.effects.enabled=true
jmud.healing.enabled=true
jmud.healing.base_hp_per_tick=1
jmud.death.respawn_ticks=10
jmud.combat.base_hit_chance=75
jmud.combat.base_crit_chance=5
jmud.combat.damage_variance_percent=0
jmud.combat.crit_multiplier=2
jmud.combat.default_attack_id=attack.unarmed
jmud.combat.attack_cadence_ticks=1
# Durability points a breakable equipped item loses each time its wearer is hit in combat.
jmud.combat.durability_loss_per_hit=1
# RNG mode: "seeded" (default, deterministic per-encounter) or "threadlocal" (non-deterministic)
jmud.combat.rng=seeded
# World seed for deterministic combat RNG.
# Leave blank to generate a random seed at boot (logged at INFO so any session can be replayed).
# Set explicitly (e.g. jmud.world.seed=12345) to make every run identical.
jmud.world.seed=
jmud.tick.interval.ms=1000
# Tick-health metrics: number of recent ticks retained for the wizard STATS command's rolling
# window (average/max duration, overruns, slowest Tickable). Metrics are in-memory only.
jmud.tick.metrics.retention=100
# Wizards: comma-separated usernames granted the wizard-only STATS command (partial role system
# until issue #44). Leave blank to grant it to no one.
jmud.wizards=
# Reconnect / linkdead: when a connection drops unexpectedly the player stays "linkdead" in the
# world for this many ticks so a new login can reattach to the live session; set enabled=false to
# tear sessions down immediately on disconnect (issue #343).
jmud.linkdead.enabled=true
jmud.linkdead.timeout_ticks=30
# Number of ticks each day/night phase lasts (the world clock flips DAY/NIGHT after this many ticks).
jmud.world.ticks_per_phase=50
# Ambient room flavour: min/max ticks between atmospheric lines emitted to an occupied room.
jmud.ambient.min_interval_ticks=8
jmud.ambient.max_interval_ticks=15
jmud.output.ansi.enabled=false
jmud.audit.enabled=true
jmud.audit.path=logs/audit.jsonl
jmud.audit.queue_size=2048
jmud.auth.allow_new_users=true
jmud.auth.max_attempts=5
jmud.auth.attempt_window_seconds=300
jmud.auth.lockout_seconds=300
jmud.auth.pbkdf2.iterations=310000
jmud.rest.regen.hp=2
jmud.rest.regen.mana=2
jmud.rest.regen.move=2
# Movement: move points spent per room step, and the extra points charged per step while
# overburdened (carrying more than your max carry weight). Resting regenerates move (jmud.rest.regen.move).
jmud.movement.step_cost=1
jmud.movement.overburdened_surcharge=1
# Auction House: number of ticks a listing stays active before it expires and is returned to the
# seller (issue #357).
jmud.auction.listing_ticks=2000
# Metrics: export tick health, player counts, queue depths, save/auth counters via JMX.
# Set to false to disable all metric registration (no JMX MBeans created).
jmud.metrics.enabled=true
