jmud.prompt.format=[{hp}/{maxHp}hp {mana}/{maxMana}mn {move}/{maxMove}mv {exp}xp]
jmud.effects.enabled=true
jmud.healing.enabled=true
jmud.healing.base_hp_per_tick=1
jmud.death.respawn_ticks=10
jmud.combat.base_hit_chance=75
jmud.combat.base_crit_chance=5
jmud.combat.damage_variance_percent=0
jmud.combat.crit_multiplier=2
jmud.combat.default_attack_id=attack.unarmed
jmud.combat.attack_cadence_ticks=1
# RNG mode: "seeded" (default, deterministic per-encounter) or "threadlocal" (non-deterministic)
jmud.combat.rng=seeded
# World seed for deterministic combat RNG.
# Leave blank to generate a random seed at boot (logged at INFO so any session can be replayed).
# Set explicitly (e.g. jmud.world.seed=12345) to make every run identical.
jmud.world.seed=
jmud.tick.interval.ms=1000
jmud.output.ansi.enabled=false
jmud.audit.enabled=true
jmud.audit.path=logs/audit.jsonl
jmud.audit.queue_size=2048
jmud.auth.allow_new_users=true
jmud.auth.max_attempts=5
jmud.auth.attempt_window_seconds=300
jmud.auth.lockout_seconds=300
jmud.auth.pbkdf2.iterations=310000
jmud.rest.regen.hp=2
jmud.rest.regen.mana=2
jmud.rest.regen.move=2
