# Configuration for the FreezingArchRule violation store used by ArchitectureTest.
# The store is committed under src/test/resources/archunit_store so that frozen
# violations only ever shrink over time (see AGENTS.md §3 and issue #175).
freeze.store.default.path=src/test/resources/archunit_store
freeze.store.default.allowStoreCreation=false
freeze.store.default.allowStoreUpdate=true
